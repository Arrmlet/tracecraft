name: release

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tracecraft-ai/
    permissions:
      id-token: write  # required for PyPI trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync root README into sdk/ before build
        run: cp README.md sdk/README.md

      - name: Build sdist + wheel
        working-directory: sdk
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify artifacts
        working-directory: sdk
        run: |
          pip install twine
          twine check dist/*
          python -m venv /tmp/verify
          /tmp/verify/bin/pip install dist/*.whl
          /tmp/verify/bin/tracecraft --version

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/dist/
